<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>C-SKIN | Domov</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        :root {
            --primary-olive: #939c6c;
            --dark-green: #1a3311;
            --header-beige: #D6D6B2;
            --bg-light: #ffffff;
            --text-gray: #7a7a7a;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --max-width-default: 1400px;
            --gap-default: 30px;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            overflow-x: hidden;
            width: 100%;
            animation: fadeIn 1.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .top-bar, 
        .product-section {
            width: 94%;
            max-width: var(--max-width-default);
            margin-left: auto;
            margin-right: auto;
        }

        header {
            background-color: var(--header-beige);
            padding: 25px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-shrink: 0;
        }

        .hamburger {
            font-size: 40px;
            cursor: pointer;
            color: var(--dark-green);
            transition: var(--transition);
            line-height: 1;
            user-select: none;
        }

        .hamburger:hover {
            color: white;
            transform: scale(1.08);
        }

        .logo-img {
            width: 100px;
            transition: var(--transition);
            display: block;
        }

        .logo-img:hover {
            transform: rotate(-3deg) scale(1.05);
        }

        .search-container {
            flex: 1;
            min-width: 220px;
            max-width: 480px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 25px;
            border: 1px solid #ddd;
            border-radius: 50px;
            outline: none;
            font-size: 1rem;
            transition: 0.2s;
            background: white;
        }

        .search-container input:focus {
            border-color: var(--primary-olive);
            box-shadow: 0 0 0 2px rgba(147, 156, 108, 0.2);
        }

        .cart-trigger {
            cursor: pointer;
            position: relative;
            padding: 5px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .cart-trigger img {
            width: 40px;
            height: auto;
            transition: var(--transition);
        }

        .cart-trigger:hover img {
            transform: scale(1.1);
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: -5px;
            background: #e74c3c;
            color: white;
            font-size: 11px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .sidenav, .cart-sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 3000;
            top: 0;
            transition: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-x: hidden;
        }

        .sidenav {
            left: 0;
            background-color: var(--primary-olive);
            padding-top: 60px;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.2);
        }

        .cart-sidebar {
            right: 0;
            background-color: white;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
        }

        .sidenav a {
            padding: 15px 32px;
            font-size: 22px;
            color: var(--dark-green);
            display: block;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            transition: 0.2s;
        }

        .sidenav a:hover {
            color: white;
            padding-left: 45px;
            background: rgba(0, 0, 0, 0.05);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            font-size: 40px;
            cursor: pointer;
            color: var(--dark-green);
            transition: 0.2s;
        }

        .sidenav .close-btn {
            right: 25px;
        }

        .cart-header .close-btn {
            position: static;
        }

        .cart-header {
            padding: 30px;
            background: var(--header-beige);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-body-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            max-height: 60vh;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .cart-item-img {
            width: 65px;
            height: 65px;
            object-fit: contain;
            background: #f5f5f0;
            border-radius: 8px;
            padding: 5px;
        }
        .cart-item-info {
            flex: 1;
            font-size: 14px;
        }
        .cart-item-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .cart-item-price {
            color: var(--dark-green);
            font-weight: 600;
        }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .cart-item-quantity button {
            background: #f0f0e0;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .cart-item-quantity button:hover {
            background: var(--primary-olive);
            color: white;
        }
        .cart-item-remove {
            background: none;
            border: none;
            color: #b33;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
            text-decoration: underline;
        }
        .cart-total {
            padding: 20px;
            border-top: 2px solid var(--header-beige);
            font-weight: bold;
            font-size: 18px;
            text-align: right;
            background: white;
        }
        .checkout-btn {
            background: var(--dark-green);
            color: white;
            padding: 18px;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
            display: block;
            border: none;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .checkout-btn:hover {
            background: var(--primary-olive);
        }
        .empty-cart-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-gray);
        }

        nav {
            background-color: rgba(147, 156, 108, 0.96);
            backdrop-filter: blur(2px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-button {
            background: transparent;
            border: none;
            padding: 12px 24px;
            color: #1a3311;
            font-weight: bold;
            font-family: 'Times New Roman', serif;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-button:hover {
            color: white;
            transform: translateY(-2px);
        }

        .product-section {
            margin: 60px auto;
            padding: 0 16px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--gap-default);
        }

        .product-card {
            text-align: center;
            transition: var(--transition);
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.08);
            border-bottom-color: var(--primary-olive);
        }

        .product-image-container {
            height: 230px;
            background: #fafaf7;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            border-radius: 8px;
        }

        .product-card img {
            max-width: 80%;
            max-height: 75%;
            transition: var(--transition);
            object-fit: contain;
        }

        .product-card:hover img {
            transform: scale(1.02);
        }

        .brand-name {
            color: var(--text-gray);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .product-title {
            font-weight: bold;
            font-size: 15px;
            margin: 8px 0 6px;
            padding: 0 8px;
            height: 44px;
            overflow: hidden;
            color: #1f2e1a;
        }

        .new-price {
            font-weight: bold;
            font-size: 19px;
            color: var(--dark-green);
            letter-spacing: -0.3px;
            margin: 8px 0;
        }

        .product-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            padding: 0 12px;
        }
        .btn-detail, .btn-cart {
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-detail {
            background: #e9e9dd;
            color: #2c3e1f;
        }
        .btn-detail:hover {
            background: #d0cfb5;
            transform: scale(0.97);
        }
        .btn-cart {
            background: var(--dark-green);
            color: white;
        }
        .btn-cart:hover {
            background: #2f5320;
            transform: scale(0.97);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 4000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: white;
            max-width: 550px;
            width: 90%;
            border-radius: 32px;
            padding: 30px;
            position: relative;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }
        .modal-close {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 32px;
            cursor: pointer;
            color: #888;
        }
        .modal-close:hover {
            color: black;
        }
        .modal-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin-bottom: 18px;
        }
        .modal-brand {
            color: var(--text-gray);
            letter-spacing: 2px;
            font-size: 12px;
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        .modal-price {
            font-size: 26px;
            color: var(--dark-green);
            font-weight: bold;
            margin: 12px 0;
        }
        .modal-desc {
            color: #444;
            line-height: 1.5;
            margin-top: 12px;
            font-size: 15px;
        }

        .promo-banner {
            background-color: var(--primary-olive);
            padding: 30px 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px; 
            cursor: pointer;
            overflow: hidden;
            border: none;
            flex-wrap: wrap;
        }

        .akcia-text {
            color: var(--dark-green);
            font-size: 70px;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            line-height: 1;
            margin: 0;
            transition: var(--transition);
        }

        .banner-logo-img {
            height: 80px; 
            opacity: 1;
            transition: var(--transition);
        }

        .promo-banner:hover .akcia-text {
            letter-spacing: 8px;
            color: #fff;
        }

        .promo-banner:hover .banner-logo-img {
            transform: scale(1.1);
        }

        .random {
            height: 50px;
            background-color: var(--header-beige);
            display: block;
            width: 100%;
        }

        footer {
            background-color: var(--primary-olive);
            padding: 55px 20px;
            text-align: center;
            color: white;
            margin-top: 100px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        @media screen and (min-width: 1400px) {
            :root {
                --max-width-default: 1440px;
                --gap-default: 40px;
            }
            .top-bar, .product-section { width: 92%; }
            .product-title { font-size: 16px; height: 48px; }
            .brand-name { font-size: 12px; }
            .new-price { font-size: 20px; }
            .product-image-container { height: 250px; }
            .akcia-text { font-size: 85px; }
        }

        @media screen and (min-width: 1700px) {
            :root {
                --max-width-default: 1600px;
                --gap-default: 50px;
            }
            .top-bar, .product-section { width: 88%; }
            .product-title { font-size: 17px; font-weight: 600; }
            .brand-name { font-size: 13px; }
            .new-price { font-size: 22px; }
            .product-image-container { height: 270px; }
            .logo-img { width: 115px; }
            .search-container input { padding: 14px 28px; font-size: 1.05rem; }
            footer { padding: 65px 20px; font-size: 16px; }
            .akcia-text { font-size: 100px; }
        }

        @media screen and (min-width: 1920px) {
            :root {
                --max-width-default: 1720px;
                --gap-default: 60px;
            }
            .top-bar, .product-section { width: 86%; }
            .product-card { border-radius: 20px; }
            .product-title { font-size: 18px; height: 52px; }
        }

        @media screen and (min-width: 1200px) and (max-width: 1399px) {
            .top-bar, .product-section { max-width: 1200px; width: 95%; }
            .product-grid { gap: 25px; }
        }

        @media screen and (max-width: 1199px) {
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
            .top-bar { flex-wrap: wrap; justify-content: center; }
            .header-left { flex: 1; }
            .search-container { order: 3; width: 100%; max-width: 100%; margin-top: 12px; }
            .nav-links { gap: 5px; }
            .nav-button { padding: 8px 16px; font-size: 16px; }
            .akcia-text { font-size: 40px; }
            .banner-logo-img { height: 50px; }
            .promo-banner { gap: 20px; padding: 20px 0; }
        }
    </style>
</head>

<script>
    const productsData = [
        { id: 1, brand: "Bioderma", name: "Atoderm Intensive Baume", price: 23.40, image: "t5.jpg", description: "Intenzívny balzam pre extrémne suchú a atopickú pokožku. Upokojuje, regeneruje a znižuje svrbenie. Bez parfumácie, vhodný pre celú rodinu." },
        { id: 2, brand: "The Ordinary", name: "AHA 30% + BHA 2% Peeling", price: 10.80, image: "a2.jpg", description: "Revolučný exfoliačný peeling na tvár. Odstraňuje odumreté bunky, vyhladzuje textúru a zlepšuje vzhľad pleti. Používajte max. 2x týždenne." },
        { id: 3, brand: "Estée Lauder", name: "Double Wear Stay-in-Place", price: 48.00, image: "l1.jpg", description: "Legendárny podkladový make-up s 24-hodinovou výdržou. Stredné až vysoké krytie, matný finiš, odolný voči potu a vlhkosti." },
        { id: 4, brand: "The Ordinary", name: "Squalane Cleanser", price: 8.20, image: "a1.jpg", description: "Jemný čistiaci krém na tvár s obsahom skvalánu. Odstraňuje make-up a nečistoty bez vysušenia pokožky. Vhodný pre všetky typy pleti." },
        { id: 5, brand: "Tom Ford", name: "Lost Cherry Eau de Parfum", price: 290.00, image: "p6.jpg", description: "Gurmánska vôňa s tónmi čerešne, mandle, likéru a santalového dreva. Sladká, opojná a provokatívna." },
        { id: 6, brand: "Marvis", name: "Whitening Mint Toothpaste", price: 9.90, image: "z4.jpg", description: "Talianska luxusná pasta s bieliacim účinkom a intenzívnou mätovou chuťou. Odstraňuje povrchové škvrny a dodáva dlhotrvajúcu sviežosť." },
        { id: 7, brand: "Moroccanoil", name: "Treatment Original Oil", price: 39.00, image: "v4.jpg", description: "Ikona starostlivosti – arganový olej bez hmotnosti. Vyživuje, urýchľuje schnutie a dodáva neprekonateľný lesk vlasom." }
    ];

    let cartItems = [];

    function saveCart() {
        localStorage.setItem("cskin_cart_home", JSON.stringify(cartItems));
    }
    function loadCart() {
        const saved = localStorage.getItem("cskin_cart_home");
        if (saved) {
            try { cartItems = JSON.parse(saved); } catch(e) { cartItems = []; }
        } else { cartItems = []; }
    }

    function getProductById(id) {
        return productsData.find(p => p.id === id);
    }

    function updateCartBadge() {
        const totalCount = cartItems.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.getElementById("cartBadge");
        if (badge) badge.innerText = totalCount;
    }

    function addToCart(productId) {
        const existing = cartItems.find(item => item.id === productId);
        if (existing) {
            existing.quantity += 1;
        } else {
            cartItems.push({ id: productId, quantity: 1 });
        }
        saveCart();
        updateCartBadge();
        renderCartSidebar();
        const btn = document.querySelector(`.product-card[data-id='${productId}'] .btn-cart`);
        if (btn) btn.style.transform = "scale(0.95)";
        setTimeout(() => { if(btn) btn.style.transform = ""; }, 150);
    }

    function changeQuantity(productId, delta) {
        const idx = cartItems.findIndex(item => item.id === productId);
        if (idx !== -1) {
            const newQty = cartItems[idx].quantity + delta;
            if (newQty <= 0) {
                cartItems.splice(idx, 1);
            } else {
                cartItems[idx].quantity = newQty;
            }
            saveCart();
            updateCartBadge();
            renderCartSidebar();
        }
    }

    function removeItemCompletely(productId) {
        cartItems = cartItems.filter(item => item.id !== productId);
        saveCart();
        updateCartBadge();
        renderCartSidebar();
    }

    function renderCartSidebar() {
        const container = document.getElementById("cartDynamicContent");
        const footerDiv = document.getElementById("cartFooter");
        if (!container) return;

        if (cartItems.length === 0) {
            container.innerHTML = `<div class="empty-cart-message"><img src="kosik.png" style="width:70px; opacity:0.6;"><p>Váš nákupný košík je momentálne prázdny.</p></div>`;
            if (footerDiv) footerDiv.innerHTML = `<a href="#" class="checkout-btn" id="emptyCheckoutBtn">POKRAČOVAŤ K PLATBE</a>`;
            const emptyBtn = document.getElementById("emptyCheckoutBtn");
            if (emptyBtn) emptyBtn.addEventListener("click", (e) => { e.preventDefault(); alert("Košík je prázdny. Pridajte produkty."); });
            return;
        }

        let itemsHtml = "";
        let totalPrice = 0;
        for (let item of cartItems) {
            const product = getProductById(item.id);
            if (!product) continue;
            const itemTotal = product.price * item.quantity;
            totalPrice += itemTotal;
            itemsHtml += `
                <div class="cart-item" data-cart-id="${product.id}">
                    <img class="cart-item-img" src="${product.image}" alt="${product.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${product.name}</div>
                        <div class="cart-item-price">${product.price.toFixed(2)} €</div>
                        <div class="cart-item-quantity">
                            <button class="cart-qty-minus" data-id="${product.id}">-</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-plus" data-id="${product.id}">+</button>
                            <button class="cart-item-remove" data-id="${product.id}">Odstrániť</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = itemsHtml;
        footerDiv.innerHTML = `
            <div class="cart-total">Celkom: ${totalPrice.toFixed(2)} €</div>
            <button class="checkout-btn" id="checkoutActionBtn">POKRAČOVAŤ K PLATBE</button>
        `;

        document.querySelectorAll(".cart-qty-minus").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                changeQuantity(id, -1);
            });
        });
        document.querySelectorAll(".cart-qty-plus").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                changeQuantity(id, 1);
            });
        });
        document.querySelectorAll(".cart-item-remove").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                removeItemCompletely(id);
            });
        });
        const checkoutBtn = document.getElementById("checkoutActionBtn");
        if (checkoutBtn) {
            checkoutBtn.addEventListener("click", (e) => {
                e.preventDefault();
                alert(`Ďakujeme za nákup! Celková suma: ${totalPrice.toFixed(2)} €. Vaša objednávka bude spracovaná.`);
            });
        }
    }

    const modal = document.getElementById("detailModal");
    const modalImg = document.getElementById("modalImage");
    const modalBrand = document.getElementById("modalBrand");
    const modalTitle = document.getElementById("modalTitle");
    const modalPrice = document.getElementById("modalPrice");
    const modalDesc = document.getElementById("modalDesc");
    const closeModalBtn = document.getElementById("closeModalBtn");

    function showProductDetail(productId) {
        const product = getProductById(productId);
        if (!product) return;
        modalImg.src = product.image;
        modalImg.alt = product.name;
        modalBrand.innerText = product.brand.toUpperCase();
        modalTitle.innerText = product.name;
        modalPrice.innerText = `${product.price.toFixed(2)} €`;
        modalDesc.innerText = product.description;
        modal.classList.add("active");
    }

    function closeModal() {
        modal.classList.remove("active");
    }

    function renderProducts() {
        const grid1 = document.getElementById("productGridContainer1");
        const grid2 = document.getElementById("productGridContainer2");
        if (!grid1 || !grid2) return;

        const firstFour = productsData.slice(0, 4);
        const lastThree = productsData.slice(4, 7);

        function createCard(product) {
            const card = document.createElement("div");
            card.className = "product-card";
            card.setAttribute("data-id", product.id);
            card.innerHTML = `
                <div class="product-image-container">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div class="brand-name">${product.brand}</div>
                <div class="product-title">${product.name}</div>
                <div class="new-price">${product.price.toFixed(2)} €</div>
                <div class="product-buttons">
                    <button class="btn-detail" data-id="${product.id}">Detail</button>
                    <button class="btn-cart" data-id="${product.id}">Do košíka</button>
                </div>
            `;
            return card;
        }

        grid1.innerHTML = "";
        firstFour.forEach(prod => grid1.appendChild(createCard(prod)));
        grid2.innerHTML = "";
        lastThree.forEach(prod => grid2.appendChild(createCard(prod)));

        document.querySelectorAll(".btn-detail").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                showProductDetail(id);
            });
        });
        document.querySelectorAll(".btn-cart").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                addToCart(id);
            });
        });
    }

    function filterProducts(searchTerm) {
        const term = searchTerm.toLowerCase().trim();
        const cards = document.querySelectorAll(".product-card");
        productsData.forEach((prod, idx) => {
            const card = cards[idx];
            if (!card) return;
            const match = prod.name.toLowerCase().includes(term) || prod.brand.toLowerCase().includes(term);
            card.style.display = match ? "block" : "none";
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadCart();
        renderProducts();
        updateCartBadge();
        renderCartSidebar();

        const searchInput = document.getElementById("searchInput");
        if (searchInput) {
            searchInput.addEventListener("input", (e) => filterProducts(e.target.value));
        }

        closeModalBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
    });

    function openNav() { document.getElementById("mySidenav").style.width = "300px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
    function toggleCart() {
        const cart = document.getElementById("cartSidebar");
        cart.style.width = (cart.style.width === "400px") ? "0" : "400px";
        if (cart.style.width === "400px") renderCartSidebar();
    }
    window.addEventListener('click', function(e) {
        const sidenav = document.getElementById("mySidenav");
        const cart = document.getElementById("cartSidebar");
        const hamburgerBtn = document.querySelector('.hamburger');
        const cartTrigger = document.querySelector('.cart-trigger');
        if (sidenav.style.width === "300px" && !sidenav.contains(e.target) && !hamburgerBtn?.contains(e.target)) closeNav();
        if (cart.style.width === "400px" && !cart.contains(e.target) && !cartTrigger?.contains(e.target)) cart.style.width = "0";
    });
</script>
</body>
</html>
